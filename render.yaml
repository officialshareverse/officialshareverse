databases:
  - name: shareverse-db
    databaseName: shareverse
    user: shareverse

services:
  - type: keyvalue
    name: shareverse-redis
    ipAllowList: []

  - type: web
    name: shareverse-api
    runtime: python
    rootDir: backend
    buildCommand: bash release.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT mystartup.asgi:application
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    domains:
      - api.shareverse.in
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_EXPOSE_DEV_OTP
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: api.shareverse.in,.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://shareverse.in,https://www.shareverse.in,https://shareverse-web.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://shareverse.in,https://www.shareverse.in,https://shareverse-web.onrender.com,https://api.shareverse.in
      - key: DJANGO_SERVE_MEDIA
        value: "true"
      - key: DJANGO_REDIS_URL
        fromService:
          type: keyvalue
          name: shareverse-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: shareverse-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_COMPANY_NAME
        value: ShareVerse
      - key: RAZORPAY_CURRENCY
        value: INR
      - key: RAZORPAYX_KEY_ID
        sync: false
      - key: RAZORPAYX_KEY_SECRET
        sync: false
      - key: RAZORPAYX_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAYX_SOURCE_ACCOUNT_NUMBER
        sync: false
      - key: DJANGO_GOOGLE_CLIENT_ID
        sync: false
      - key: DJANGO_SENTRY_DSN
        sync: false
      - key: DJANGO_SENTRY_ENVIRONMENT
        value: production
      - key: DJANGO_SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: DJANGO_SENTRY_PROFILES_SAMPLE_RATE
        value: "0"
      - key: DJANGO_SENTRY_SEND_DEFAULT_PII
        value: "false"

  - type: cron
    name: shareverse-refund-processor
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py process_expired_group_buy_refunds
    schedule: "*/5 * * * *"
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_EXPOSE_DEV_OTP
        value: "false"
      - key: DJANGO_SERVE_MEDIA
        value: "true"
      - key: DJANGO_REDIS_URL
        fromService:
          type: keyvalue
          name: shareverse-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: shareverse-db
          property: connectionString
      - key: DJANGO_SENTRY_DSN
        sync: false
      - key: DJANGO_SENTRY_ENVIRONMENT
        value: production
      - key: DJANGO_SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: DJANGO_SENTRY_PROFILES_SAMPLE_RATE
        value: "0"
      - key: DJANGO_SENTRY_SEND_DEFAULT_PII
        value: "false"

  - type: web
    name: shareverse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    autoDeployTrigger: commit
    domains:
      - shareverse.in
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: REACT_APP_API_BASE_URL
        value: https://api.shareverse.in/api/
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
      - key: REACT_APP_SENTRY_DSN
        sync: false
      - key: REACT_APP_SENTRY_ENVIRONMENT
        value: production
      - key: REACT_APP_SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: REACT_APP_SENTRY_REPLAYS_SESSION_SAMPLE_RATE
        value: "0"
      - key: REACT_APP_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE
        value: "0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
