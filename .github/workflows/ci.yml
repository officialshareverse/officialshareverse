name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_ENV: test
      DJANGO_SECRET_KEY: ci-secret-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pip-audit

      - name: Lint with Ruff
        run: ruff check .

      - name: Security Audit (pip-audit)
        run: pip-audit

      - name: Check for migration drift
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check

      - name: Run backend test suite
        run: python manage.py test core.tests core.tests_security --verbosity 1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint --if-present

      - name: Security Audit (npm audit)
        run: npm audit --audit-level=high || true

      - name: Run frontend tests
        run: npm test -- --watchAll=false --runInBand --verbose

      - name: Build frontend
        run: npm run build
